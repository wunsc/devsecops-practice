# infra/phase3/sonarqube-secrets.yaml
# Database credentials for SonarQube's dedicated PostgreSQL instance
# Apply FIRST — referenced by PostgreSQL and SonarQube deployments
# IMPORTANT: Replace placeholder values before applying
---
apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-db-credentials
  namespace: devsecops-tools
  labels:
    team: devsecops
    component: sonarqube
type: Opaque
stringData:
  # PostgreSQL superuser password
  POSTGRES_PASSWORD: "S0narPG!2024Admin"
  # SonarQube database credentials
  SONARQUBE_DB_NAME: "sonarqube"
  SONARQUBE_DB_USER: "sonarqube"
  SONARQUBE_DB_PASSWORD: "S0narQube!DB2024x"
  # JDBC URL constructed for SonarQube — references the PostgreSQL service
  SONARQUBE_JDBC_URL: "jdbc:postgresql://sonarqube-postgresql.devsecops-tools.svc.cluster.local:5432/sonarqube"
