# infra/phase1/networkpolicies/default-deny.yaml
# Default deny-all ingress for application namespaces
# Zero-trust baseline: all traffic is blocked unless explicitly allowed
# Applied to: sampleapi-dev, sampleapi-sit, sampleapi-uat, sampleapi-prod
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: sampleapi-dev
  labels:
    team: devsecops
    policy: default-deny
spec:
  podSelector: {}  # Applies to ALL pods in namespace
  policyTypes:
    - Ingress
  # No ingress rules = deny all ingress traffic
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: sampleapi-sit
  labels:
    team: devsecops
    policy: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: sampleapi-uat
  labels:
    team: devsecops
    policy: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: sampleapi-prod
  labels:
    team: devsecops
    policy: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
