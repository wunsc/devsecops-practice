# infra/phase6/argocd-app-prod.yaml
# ArgoCD Application for PRODUCTION environment
# syncPolicy: manual — requires Change Advisory Board approval via MR
# Most restrictive: no auto-prune, no self-heal
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sampleapi-prod
  namespace: openshift-gitops
  labels:
    team: devsecops
    app: sampleapi
    environment: production
spec:
  project: devsecops

  source:
    repoURL: "https://gitlab-devsecops-gitlab.apps.cluster-pmqwq.pmqwq.sandbox270.opentlc.com/devsecops/app-gitops.git"
    targetRevision: main
    path: overlays/production

  destination:
    server: "https://kubernetes.default.svc"
    namespace: sampleapi-prod

  # Manual sync for PRODUCTION — CAB approval required
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
