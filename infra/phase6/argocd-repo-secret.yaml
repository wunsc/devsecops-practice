# infra/phase6/argocd-repo-secret.yaml
# GitLab repository credentials for ArgoCD
# ArgoCD uses these to clone the app-gitops repository
# IMPORTANT: Replace placeholder values before applying
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-repo-credentials
  namespace: openshift-gitops
  labels:
    team: devsecops
    # ArgoCD discovers repo credentials via this label
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  # GitLab URL for the app-gitops repository
  url: "https://gitlab-devsecops-gitlab.apps.cluster-pmqwq.pmqwq.sandbox270.opentlc.com/devsecops/app-gitops.git"
  # Authentication — use GitLab personal access token
  username: "root"
  password: "glpat-HR7qRR251Acr1cexjtoT"
  # TLS — skip verification for self-signed certs on internal GitLab
  insecure: "true"
  type: "git"
