# infra/phase6/argocd-app-uat.yaml
# ArgoCD Application for UAT environment
# syncPolicy: manual — requires QA Lead approval via MR + DAST re-run
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sampleapi-uat
  namespace: openshift-gitops
  labels:
    team: devsecops
    app: sampleapi
    environment: uat
spec:
  project: devsecops

  source:
    repoURL: "https://gitlab-devsecops-gitlab.apps.cluster-pmqwq.pmqwq.sandbox270.opentlc.com/devsecops/app-gitops.git"
    targetRevision: main
    path: overlays/uat

  destination:
    server: "https://kubernetes.default.svc"
    namespace: sampleapi-uat

  # Manual sync for UAT — QA Lead approves MR, then manually syncs
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
