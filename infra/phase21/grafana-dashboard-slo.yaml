# infra/phase21/grafana-dashboard-slo.yaml
# GrafanaDashboard CRD — SLO Burn Rate & Error Budget Dashboard
#
# Visualizes SLO compliance using the recording rules from Phase 20:
#   - Current error budget remaining (%)
#   - Burn rate over 1h/6h/3d windows
#   - SLO compliance history (was the SLO met each day?)
#   - Error ratio over time
#
# Uses the recording rules: sampleapi:http_error_ratio:rate{5m,30m,1h,6h,3d}
# defined in prometheus-rules-slo.yaml (Phase 20).
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: slo-dashboard
  namespace: devsecops-tools
  labels:
    app: grafana
    team: devsecops
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "SLO Status — 99.9% Availability",
          "type": "row"
        },
        {
          "title": "Error Budget Remaining (%)",
          "description": "SLO: 99.9% availability = 0.1% error budget. Shows how much budget is left this month.",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 1 },
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "100 * (1 - (sampleapi:http_error_ratio:rate3d / 0.001))",
              "legendFormat": "Budget remaining"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent", "min": 0, "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 25 },
                  { "color": "green", "value": 75 }
                ]
              }
            }
          }
        },
        {
          "title": "Current Error Rate",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 1 },
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sampleapi:http_error_ratio:rate5m * 100",
              "legendFormat": "5m error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.1 },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "title": "SLO Target",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "(1 - sampleapi:slo_target) * 100",
              "legendFormat": "SLO"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percent" } }
        },
        {
          "title": "Monthly Error Budget",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 4,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sampleapi:slo_target * 30 * 24 * 60",
              "legendFormat": "minutes"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "m" } }
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 101,
          "title": "Burn Rate Windows",
          "type": "row"
        },
        {
          "title": "Burn Rate (1h window)",
          "description": "Error ratio / SLO target. >14.4x = critical, >6x = warning.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 10 },
          "id": 5,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sampleapi:http_error_ratio:rate1h / 0.001",
              "legendFormat": "1h burn rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 6 },
                  { "color": "red", "value": 14.4 }
                ]
              },
              "custom": { "thresholdsStyle": { "mode": "line" } }
            }
          }
        },
        {
          "title": "Burn Rate (6h window)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 10 },
          "id": 6,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sampleapi:http_error_ratio:rate6h / 0.001",
              "legendFormat": "6h burn rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 6 },
                  { "color": "red", "value": 14.4 }
                ]
              }
            }
          }
        },
        {
          "title": "Burn Rate (3d window)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 10 },
          "id": 7,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sampleapi:http_error_ratio:rate3d / 0.001",
              "legendFormat": "3d burn rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 102,
          "title": "Error Ratio History",
          "type": "row"
        },
        {
          "title": "Error Ratio Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 19 },
          "id": 8,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sampleapi:http_error_ratio:rate5m * 100",
              "legendFormat": "5m error ratio"
            },
            {
              "expr": "sampleapi:http_error_ratio:rate1h * 100",
              "legendFormat": "1h error ratio"
            },
            {
              "expr": "0.1",
              "legendFormat": "SLO threshold (0.1%)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": { "drawStyle": "line", "fillOpacity": 5 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "SLO threshold (0.1%)" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 5] } },
                  { "id": "color", "value": { "fixedColor": "red" } }
                ]
              }
            ]
          }
        }
      ],
      "refresh": "1m",
      "schemaVersion": 39,
      "tags": ["devsecops", "slo", "error-budget"],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          }
        ]
      },
      "time": { "from": "now-7d", "to": "now" },
      "title": "SLO Burn Rate & Error Budget",
      "uid": "devsecops-slo"
    }
