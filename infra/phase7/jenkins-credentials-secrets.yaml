# infra/phase7/jenkins-credentials-secrets.yaml
# All credential secrets that Jenkins needs for pipeline execution
#
# IMPORTANT: These are OCP Secrets that store credential values.
# Credentials are then configured in Jenkins via Script Console (NOT JCasC)
# because JCasC causes circular resolution when credential IDs match
# casc_secrets/ filenames — leading to empty values on reload.
#
# After Jenkins is deployed, use the Script Console to create credentials.
# See README-jenkins-setup.md for the Script Console commands.
#
# Replace all CHANGE_ME values before applying.
---
# GitLab credentials (username + password/token for repo cloning)
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-gitlab-credentials
  namespace: devsecops-tools
  labels:
    team: devsecops
    component: jenkins
    credential-type: usernamePassword
  annotations:
    jenkins-credential-id: "gitlab-token"
    description: "GitLab credentials for repo cloning (username + token)"
type: Opaque
stringData:
  username: "root"
  password: "glpat-HR7qRR251Acr1cexjtoT"
---
# GitLab API token (string credential for MR status reporting)
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-gitlab-api-token
  namespace: devsecops-tools
  labels:
    team: devsecops
    component: jenkins
    credential-type: string
  annotations:
    jenkins-credential-id: "gitlab-api-token"
    description: "GitLab API token for MR status reporting (reportToGitLab.groovy)"
type: Opaque
stringData:
  token: "glpat-HR7qRR251Acr1cexjtoT"
---
