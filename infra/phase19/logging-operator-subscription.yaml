# infra/phase19/logging-operator-subscription.yaml
# Red Hat OpenShift Logging Operator (Cluster Logging 6.x)
#
# Manages the ClusterLogForwarder CR which controls:
#   - What logs to collect (application, infrastructure, audit)
#   - Where to send them (LokiStack, external Elasticsearch, Splunk, etc.)
#   - How to filter/transform them (drop, prune, parse JSON)
#
# In Logging 6.x, the ClusterLogForwarder uses the new API:
#   observability.openshift.io/v1  (NOT logging.openshift.io/v1)
#
# The collector (Vector) is deployed as a DaemonSet — one pod per node.
# It reads container stdout/stderr from /var/log/pods/* and forwards to outputs.
#
# APPLY:
#   oc apply -f logging-operator-subscription.yaml
#
# VERIFY:
#   oc get csv -n openshift-logging | grep cluster-logging
#   # Expected: cluster-logging.v6.x.y — Succeeded
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: cluster-logging
  namespace: openshift-logging
spec:
  channel: stable-6.2                         # OCP 4.20 supports 6.2/6.3/6.4
  installPlanApproval: Automatic
  name: cluster-logging
  source: redhat-operators
  sourceNamespace: openshift-marketplace
