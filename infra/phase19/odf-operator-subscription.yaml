# infra/phase19/odf-operator-subscription.yaml
# OpenShift Data Foundation (ODF) Operator — provides S3-compatible object storage
# via NooBaa for LokiStack and Tempo backends.
#
# ODF includes:
#   - Ceph (block/file storage)
#   - NooBaa (S3-compatible object storage)   ← used by Loki and Tempo
#   - MCG (Multi-Cloud Gateway)
#
# WHY ODF instead of MinIO:
#   ODF is the supported, OCP-bundled object storage solution. NooBaa provides
#   S3-compatible storage without deploying a separate MinIO instance.
#   ObjectBucketClaim CRDs auto-provision buckets with credentials.
#
# PREREQUISITES:
#   - OCP 4.14+ with at least 3 worker nodes (ODF requires 3 nodes for Ceph)
#   - Each worker node needs at least 1 unformatted disk or 100Gi of available storage
#   - If running on AWS, gp3 EBS volumes will be used automatically
#
# APPLY:
#   oc apply -f odf-operator-subscription.yaml
#
# VERIFY:
#   oc get csv -n openshift-storage | grep odf
#   # Expected: odf-operator.v4.x.y — Succeeded
#
#   oc get pods -n openshift-storage
#   # Expected: noobaa-core, noobaa-endpoint, rook-ceph-* pods Running
---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-storage
  labels:
    openshift.io/cluster-monitoring: "true"    # Enable monitoring for ODF namespace
  annotations:
    openshift.io/description: "OpenShift Data Foundation — Ceph + NooBaa object storage"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-storage-operatorgroup
  namespace: openshift-storage
spec:
  targetNamespaces:
    - openshift-storage
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: odf-operator
  namespace: openshift-storage
spec:
  channel: stable-4.17                         # Match your OCP minor version
  installPlanApproval: Automatic
  name: odf-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
