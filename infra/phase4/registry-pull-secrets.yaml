# infra/phase4/registry-pull-secrets.yaml
# Pull secrets for each app namespace to pull images from the OCP internal registry
#
# Strategy: Using OCP internal registry (image-registry.openshift-image-registry.svc:5000)
# Images are pushed to sampleapi-dev namespace and pulled by SIT/UAT/PROD namespaces.
# Instead of creating dockerconfigjson pull secrets, we use RoleBindings to grant
# system:image-puller to the target namespace service accounts (done in Phase 1).
#
# For environments that need to pull from an EXTERNAL registry (e.g., Quay.io),
# uncomment and configure the secrets below with valid credentials.
---
# --- External registry pull secret (OPTIONAL — only if using Quay.io or other external registry) ---
# Uncomment and configure if migrating to an external registry in the future.
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: registry-pull-secret
#   namespace: sampleapi-dev
#   labels:
#     team: devsecops
#     app: sampleapi
# type: kubernetes.io/dockerconfigjson
# stringData:
#   .dockerconfigjson: |
#     {
#       "auths": {
#         "quay.io": {
#           "username": "CHANGE_ME",
#           "password": "CHANGE_ME",
#           "email": "devsecops@example.com"
#         }
#       }
#     }
# ---
# Repeat for sampleapi-sit, sampleapi-uat, sampleapi-prod

# --- Internal registry: Link SA secrets for cross-namespace image pulling ---
# The OCP internal registry uses ServiceAccount tokens for authentication.
# Cross-namespace pulling is enabled by the system:image-puller RoleBindings
# created in Phase 1 (rolebindings.yaml).
#
# If additional pull secret linking is needed (e.g., for default SA), use:
# oc secrets link default registry-pull-secret --for=pull -n <namespace>
#
# For the internal registry, no separate pull secret resources are needed —
# the RoleBindings in Phase 1 handle cross-namespace image access.
---
# Placeholder ConfigMap documenting the registry strategy
# (keeps this file valid YAML that can be applied without error)
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-strategy
  namespace: devsecops-tools
  labels:
    team: devsecops
    component: registry
data:
  REGISTRY_TYPE: "internal"
  REGISTRY_HOST: "image-registry.openshift-image-registry.svc:5000"
  IMAGE_NAMESPACE: "sampleapi-dev"
  IMAGE_NAME: "sampleapi"
  # Image reference pattern:
  # image-registry.openshift-image-registry.svc:5000/sampleapi-dev/sampleapi:<tag>
  #
  # Tag patterns:
  #   T2 (merge to main): main-<short-sha>   e.g., main-a1b2c3d
  #   T3 (git tag):       <tag-name>         e.g., v1.2.0
