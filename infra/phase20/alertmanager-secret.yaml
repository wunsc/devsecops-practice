# infra/phase20/alertmanager-secret.yaml
# Secret containing Slack webhook URLs for AlertmanagerConfig receivers.
#
# IMPORTANT: Replace the placeholder URLs with real Slack incoming webhook URLs.
#            In production, use ExternalSecrets (Phase 18) instead of plain-text secrets.
#
# TO CREATE SLACK WEBHOOKS:
#   1. Go to https://api.slack.com/apps → Create New App → From scratch
#   2. Enable "Incoming Webhooks" feature
#   3. Add webhook to workspace → select channel
#   4. Copy the webhook URL (https://hooks.slack.com/services/T.../B.../...)
#   5. Create one webhook per channel (#devsecops-critical, #devsecops-alerts, #devsecops-info)
#
# DEPLOY TO: Each app namespace (before applying alertmanager-config.yaml).
#   oc apply -f alertmanager-secret.yaml -n sampleapi-dev
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-slack-webhook
  labels:
    app: sampleapi
    team: devsecops
type: Opaque
stringData:
  # Replace these with real Slack incoming webhook URLs
  critical-webhook-url: "https://hooks.slack.com/services/CHANGE_ME/CRITICAL/WEBHOOK"
  warning-webhook-url: "https://hooks.slack.com/services/CHANGE_ME/WARNING/WEBHOOK"
  info-webhook-url: "https://hooks.slack.com/services/CHANGE_ME/INFO/WEBHOOK"

