# infra/phase27/rhtpa-jenkins-credentials.yaml
# Jenkins credentials for RHTPA (Trustify) SBOM upload
#
# The generateSBOM.groovy shared library function uses these to:
# 1. Obtain an OIDC token from Keycloak (walker client)
# 2. Upload CycloneDX SBOM to Trustify REST API
# 3. Query vulnerability data for the uploaded SBOM
#
# These secrets should be added to Jenkins via JCasC or manually:
#   - TRUSTIFY_CLIENT_ID: walker
#   - TRUSTIFY_CLIENT_SECRET: walker-secret-rhtpa-2026
#   - TRUSTIFY_URL: https://server.apps.<cluster-domain>
#   - KEYCLOAK_TOKEN_URL: https://keycloak.apps.<cluster-domain>/realms/trustify/protocol/openid-connect/token
---
apiVersion: v1
kind: Secret
metadata:
  name: trustify-pipeline-credentials
  namespace: devsecops-tools
  labels:
    app: jenkins
    credential-type: trustify
type: Opaque
stringData:
  TRUSTIFY_CLIENT_ID: walker
  TRUSTIFY_CLIENT_SECRET: walker-secret-rhtpa-2026
  TRUSTIFY_URL: https://server.apps.<CLUSTER_DOMAIN>                                                     # ← REPLACE
  KEYCLOAK_TOKEN_URL: https://keycloak.apps.<CLUSTER_DOMAIN>/realms/trustify/protocol/openid-connect/token  # ← REPLACE
