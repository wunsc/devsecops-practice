# infra/phase27/rhtpa-postgresql.yaml
# PostgreSQL for RHTPA (Trustify) — stores SBOMs, advisories, vulnerabilities
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rhtpa-db-pvc
  namespace: test-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi                    # Advisories + SBOMs grow over time
  storageClassName: thin-csi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhtpa-postgresql
  namespace: test-app
  labels:
    app: rhtpa-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhtpa-postgresql
  template:
    metadata:
      labels:
        app: rhtpa-postgresql
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-15:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: trustify
            - name: POSTGRESQL_PASSWORD
              value: trustify-db-2026    # ← CHANGE in production
            - name: POSTGRESQL_DATABASE
              value: trustify
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi               # Importer needs memory for large advisory sets
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rhtpa-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rhtpa-postgresql
  namespace: test-app
spec:
  selector:
    app: rhtpa-postgresql
  ports:
    - port: 5432
      targetPort: 5432
