# infra/phase5/acs-operator-subscription.yaml
# OLM Subscription for Red Hat Advanced Cluster Security (ACS / StackRox) Operator
# The operator manages Central, Scanner, SecuredCluster CRDs
# Installs into rhacs-operator namespace (created automatically by OLM)
---
# Namespace for the operator (OLM may create it, but explicit is safer)
apiVersion: v1
kind: Namespace
metadata:
  name: rhacs-operator
  labels:
    team: devsecops
    purpose: security
---
# Namespace for ACS Central and Scanner components
apiVersion: v1
kind: Namespace
metadata:
  name: stackrox
  labels:
    team: devsecops
    purpose: security
---
# OperatorGroup — required for OLM to install the operator
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhacs-operator-group
  namespace: rhacs-operator
spec: {}
---
# Subscription — tells OLM to install and keep the operator updated
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhacs-operator
  namespace: rhacs-operator
  labels:
    team: devsecops
spec:
  channel: stable
  installPlanApproval: Automatic
  name: rhacs-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
