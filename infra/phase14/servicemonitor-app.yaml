# infra/phase14/servicemonitor-app.yaml
# Prometheus ServiceMonitor for SampleAPI application pods
#
# This tells Prometheus to scrape metrics from the application's /metrics endpoint.
# ASP.NET Core exposes Prometheus metrics via the prometheus-net.AspNetCore NuGet package
# or via OpenTelemetry exporter.
#
# If the app does not expose /metrics, Prometheus will still collect basic
# container metrics (CPU, memory, network) via cAdvisor and kube-state-metrics.
#
# APPLY TO: each application namespace
#   oc apply -f servicemonitor-app.yaml -n sampleapi-dev
#   oc apply -f servicemonitor-app.yaml -n sampleapi-sit
#   oc apply -f servicemonitor-app.yaml -n sampleapi-uat
#   oc apply -f servicemonitor-app.yaml -n sampleapi-prod
#
# VERIFY:
#   # Check ServiceMonitor is picked up by Prometheus
#   oc get servicemonitor -n sampleapi-dev
#   # Check targets in Prometheus UI (OCP Console → Observe → Targets)
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sampleapi-monitor
  labels:
    app: sampleapi
    team: devsecops
    # This label is required for user workload monitoring to pick it up
    app.kubernetes.io/part-of: sampleapi
spec:
  # Select the sampleapi Service by label
  selector:
    matchLabels:
      app: sampleapi
  # Scrape configuration
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      # If the app doesn't expose /metrics yet, this will show as "down"
      # in targets — that's OK, basic container metrics still work
      honorLabels: true
  # Target namespaces — ServiceMonitor must be in the same namespace as the Service
  # or have appropriate RBAC. Since we apply per-namespace, namespaceSelector is "self"
  namespaceSelector:
    matchNames: []
    # Empty matchNames = same namespace as the ServiceMonitor

---
# PodMonitor as fallback — scrapes pods directly (useful if Service is not set up)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: sampleapi-pod-monitor
  labels:
    app: sampleapi
    team: devsecops
spec:
  selector:
    matchLabels:
      app: sampleapi
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames: []
