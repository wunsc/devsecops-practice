# infra/phase2/gitlab-service.yaml
# ClusterIP services for GitLab CE, PostgreSQL, and Redis
# Internal-only access — external access via Route
---
# GitLab CE HTTP service (Nginx on 8080)
apiVersion: v1
kind: Service
metadata:
  name: gitlab-ce
  namespace: devsecops-gitlab
  labels:
    team: devsecops
    app: gitlab-ce
spec:
  type: ClusterIP
  selector:
    app: gitlab-ce
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: ssh
      port: 2222
      targetPort: 2222
      protocol: TCP
---
# PostgreSQL service — accessed by GitLab
apiVersion: v1
kind: Service
metadata:
  name: gitlab-postgresql
  namespace: devsecops-gitlab
  labels:
    team: devsecops
    app: gitlab-postgresql
spec:
  type: ClusterIP
  selector:
    app: gitlab-postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# Redis service — accessed by GitLab
apiVersion: v1
kind: Service
metadata:
  name: gitlab-redis
  namespace: devsecops-gitlab
  labels:
    team: devsecops
    app: gitlab-redis
spec:
  type: ClusterIP
  selector:
    app: gitlab-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
