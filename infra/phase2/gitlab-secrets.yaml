# infra/phase2/gitlab-secrets.yaml
# All secrets for GitLab CE, PostgreSQL, and Redis
# IMPORTANT: Replace placeholder values before applying
# Apply FIRST — other resources reference these secrets
---
# PostgreSQL database credentials used by both PostgreSQL and GitLab
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-db-credentials
  namespace: devsecops-gitlab
  labels:
    team: devsecops
    component: gitlab-postgresql
type: Opaque
stringData:
  # PostgreSQL superuser password
  POSTGRES_PASSWORD: "P0stgr3s!GitLab2024x"
  # GitLab database name, user, and password
  GITLAB_DB_NAME: "gitlabhq_production"
  GITLAB_DB_USER: "gitlab"
  GITLAB_DB_PASSWORD: "G1tLab!DB2024Secure"
---
# Redis password
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-redis-credentials
  namespace: devsecops-gitlab
  labels:
    team: devsecops
    component: gitlab-redis
type: Opaque
stringData:
  REDIS_PASSWORD: "R3dis!GitLab2024Key"
---
# GitLab root password and encryption keys
# CRITICAL: db_key_base, secret_key_base, otp_key_base MUST be persistent
# If these change on pod restart, all encrypted DB data (tokens, webhooks) becomes unreadable
# causing OpenSSL::Cipher::CipherError on all encrypted columns
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-rails-secrets
  namespace: devsecops-gitlab
  labels:
    team: devsecops
    component: gitlab-ce
type: Opaque
stringData:
  # Initial root password (change after first login)
  GITLAB_ROOT_PASSWORD: "xK9mP2vL7qR4wBn"
  # These 3 keys MUST remain constant across pod restarts
  # Generate with: head -c 64 /dev/urandom | base64 | tr -d '\n'
  DB_KEY_BASE: "AOZdfqqoZ0E+Y5j9lLRygA+MT2+C2hgR1S+MLlpLBPuwFo7j1Uz0LUz5ylLWvM/JpQlqNb70xNjw38KyPoK2vg"
  SECRET_KEY_BASE: "84ZUSd0Ovzin/RpfHHAU57Y63NqGGmvtywi3dSISceyuTp89+Dgx+D5msmBYz0krQmYfKNvZHP5BEsT6zHs3UA"
  OTP_KEY_BASE: "YDqpnKWhBE0xA0qb30HG3c7qvL+n6Uzoo9bAwDgO2EQN5sXDXMtFc7oXjwI+XJfJ93hzzV33OaydX+JDw57miQ"
