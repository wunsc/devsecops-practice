apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-javaapp-prod
  namespace: openshift-gitops
  labels:
    team: devsecops
    app: infra-javaapp
    environment: prod
spec:
  project: devsecops
  source:
    repoURL: "https://gitlab-devsecops-gitlab.apps.muhrahma-cluster.vmware.tamlab.rdu2.redhat.com/devsecops/app-gitops.git"
    targetRevision: main
    path: infra-javaapp/overlays/production
  destination:
    server: "https://kubernetes.default.svc"
    namespace: javaapp-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
