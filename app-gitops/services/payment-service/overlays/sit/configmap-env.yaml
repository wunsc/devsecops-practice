apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-env
data:
  DATABASE_URL: "jdbc:postgresql://postgresql.javaapp-sit.svc:5432/orderservice"
  DATABASE_USER: "orderservice"
  REDIS_HOST: "redis.javaapp-sit.svc"
  REDIS_PORT: "6379"
  SERVER_PORT: "8082"
  NOTIFICATIONAPI_URL: "http://notificationapi.sampleapi-sit.svc:8081"
  OTEL_SERVICE_NAME: "payment-service"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-collector.openshift-tempo.svc:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=javaapp-sit,deployment.environment=sit"
  SPRING_PROFILES_ACTIVE: "sit"
