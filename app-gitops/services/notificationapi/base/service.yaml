# app-gitops/base/notificationapi-service.yaml
# ClusterIP Service for NotificationAPI — internal access only
---
apiVersion: v1
kind: Service
metadata:
  name: notificationapi
  labels:
    app: notificationapi
spec:
  type: ClusterIP
  selector:
    app: notificationapi
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP
