# app-gitops/overlays/production/pdb-notificationapi.yaml
# PDB for NotificationAPI — ensures at least 1 pod is always available
# during voluntary disruptions (node drain, rolling updates, cluster upgrades)
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notificationapi-pdb
  labels:
    app: notificationapi
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: notificationapi
