# app-gitops/overlays/sit/patch-sampleapi.yaml
# SIT-specific: 2 replicas, moderate resources
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sampleapi
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: sampleapi
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
