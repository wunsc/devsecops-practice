apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-env
data:
  DATABASE_URL: "jdbc:postgresql://postgresql.javaapp-prod.svc:5432/orderservice"
  DATABASE_USER: "orderservice"
  REDIS_HOST: "redis.javaapp-prod.svc"
  REDIS_PORT: "6379"
  SERVER_PORT: "8080"
  INVENTORY_SERVICE_URL: "http://inventory-service.javaapp-prod.svc:8081"
  PAYMENT_SERVICE_URL: "http://payment-service.javaapp-prod.svc:8082"
  SAMPLEAPI_URL: "http://sampleapi.sampleapi-production.svc:8080"
  NOTIFICATIONAPI_URL: "http://notificationapi.sampleapi-production.svc:8081"
  OTEL_SERVICE_NAME: "order-service"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-collector.openshift-tempo.svc:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=javaapp-prod,deployment.environment=production"
  SPRING_PROFILES_ACTIVE: "production"
