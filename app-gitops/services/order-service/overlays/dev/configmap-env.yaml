apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-env
data:
  DATABASE_URL: "jdbc:postgresql://postgresql.javaapp-dev.svc:5432/orderservice"
  DATABASE_USER: "orderservice"
  REDIS_HOST: "redis.javaapp-dev.svc"
  REDIS_PORT: "6379"
  SERVER_PORT: "8080"
  OTEL_SERVICE_NAME: "order-service"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-collector.openshift-tempo.svc:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_RESOURCE_ATTRIBUTES: "k8s.namespace.name=javaapp-dev,service.namespace=javaapp-dev,deployment.environment=dev"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "none"
  SPRING_PROFILES_ACTIVE: "dev"
  # Filter out health/readiness probes from traces (they generate noise)
  OTEL_INSTRUMENTATION_COMMON_DEFAULT_ENABLED: "true"
  OTEL_INSTRUMENTATION_SPRING_WEBMVC_ENABLED: "true"
  # Suppress health check spans — Kubernetes probes hit these every 10-15s
  OTEL_JAVA_EXPERIMENTAL_SPAN_SUPPRESSION_STRATEGY: "semconv"
  INVENTORY_SERVICE_URL: "http://inventory-service.javaapp-dev.svc:8081"
  PAYMENT_SERVICE_URL: "http://payment-service.javaapp-dev.svc:8082"
  SAMPLEAPI_URL: "http://sampleapi.sampleapi-dev.svc:8080"
  NOTIFICATIONAPI_URL: "http://notificationapi.sampleapi-dev.svc:8081"
