# build-config/sonar-project.properties
# SonarQube scanner configuration reference for the SampleAPI project
#
# IMPORTANT: The .NET SonarScanner (dotnet-sonarscanner) does NOT read this file.
# It uses CLI arguments instead (see scanSonarQube.groovy in the shared library).
# This file serves as DOCUMENTATION of the scanner settings used by the pipeline.
#
# The actual scanner invocation in scanSonarQube.groovy:
#   dotnet sonarscanner begin \
#       /k:"sampleapi" \
#       /d:sonar.host.url="..." \
#       /d:sonar.token="..." \
#       /d:sonar.cs.opencover.reportsPaths="coverage-results/coverage.opencover.xml"
#
# If using a non-.NET project, the standalone sonar-scanner CLI WILL read this file.

# --- Project identification ---
sonar.projectKey=sampleapi
sonar.projectName=SampleAPI
sonar.projectVersion=1.0

# --- Source configuration ---
sonar.sources=src/
sonar.tests=tests/
sonar.sourceEncoding=UTF-8
sonar.language=cs

# --- Coverage ---
# OpenCover format generated by Coverlet during dotnet test
sonar.cs.opencover.reportsPaths=coverage-results/coverage.opencover.xml

# --- Exclusions ---
# Exclude generated code, build artifacts, and test code from analysis
sonar.exclusions=**/bin/**,**/obj/**,**/publish/**,**/Migrations/**
sonar.coverage.exclusions=**/Tests/**,**/test/**,**/*Tests*/**,**/Program.cs
sonar.test.exclusions=**/bin/**,**/obj/**

# --- Duplication detection ---
sonar.cpd.exclusions=**/Migrations/**

# --- Quality gate ---
# Quality gate is configured in SonarQube server (not in this file)
# Gate: 0 bugs, 0 vulns, >=80% coverage, <3% duplication
# sonar.qualitygate.wait=true  # Handled by scanSonarQube.groovy polling
